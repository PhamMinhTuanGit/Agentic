services:
  app:
    image: agentic:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:123456@mysql:3306/chat_history_db
      - RUNNING_IN_DOCKER=true
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    command: /bin/sh -c "python init_db.py && python init_ollama.py && sleep 10 && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: chat_history_db
      MYSQL_INITDB_SKIP_TZINFO: "true"
    ports:
      - "3306:3306"
    command: --bind-address=0.0.0.0
    volumes:
      - mysql_data:/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/data
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local
  ollama_models:
    driver: local