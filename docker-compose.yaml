services:
  app:
    image: agentic:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:123456@mysql:3306/chat_history_db
    depends_on:
      mysql:
        condition: service_healthy
    command: /bin/sh -c "sleep 15 && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: chat_history_db
      MYSQL_INITDB_SKIP_TZINFO: "true"
    ports:
      - "3306:3306"
    command: --bind-address=0.0.0.0
    volumes:
      - mysql_data:/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/data
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && (ollama list | grep 'qwen3:4b' || ollama pull qwen3:4b) && (ollama list | grep 'nomic-embed-text' || ollama pull nomic-embed-text) && wait"]
volumes:
  mysql_data:
    driver: local
  ollama_data:
    driver: local